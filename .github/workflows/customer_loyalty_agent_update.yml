name: Deploy Customer Loyalty Agent

on:
  push:
    paths:
      - 'src/prompts/CustomerLoyaltyAgentPrompt.txt'
      - 'src/infra/agents/customer-loyalty.json'
      - '.github/workflows/customer_loyalty_agent_update.yml'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: |
          SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.subscriptionId')
          az account set --subscription "$SUBSCRIPTION_ID"
          echo "Active subscription: $(az account show --query name -o tsv)"

      - name: Setup environment variables
        run: |
          echo "${{ secrets.ENV }}" > /tmp/.env
          FOUNDRY_ENDPOINT=$(grep -E '^FOUNDRY_ENDPOINT=' /tmp/.env | head -1 | cut -d'=' -f2- | tr -d '"')
          GPT_DEPLOYMENT=$(grep -E '^gpt_deployment=' /tmp/.env | head -1 | cut -d'=' -f2- | tr -d '"')
          echo "FOUNDRY_ENDPOINT=$FOUNDRY_ENDPOINT" >> $GITHUB_ENV
          echo "GPT_DEPLOYMENT=$GPT_DEPLOYMENT" >> $GITHUB_ENV
          echo "Debug - FOUNDRY_ENDPOINT: $FOUNDRY_ENDPOINT"
          echo "Debug - GPT_DEPLOYMENT: $GPT_DEPLOYMENT"

      - name: Deploy customer-loyalty agent to Foundry
        run: |
          # Read the prompt file and escape it for JSON
          INSTRUCTIONS=$(python3 -c "
          import json, sys
          with open('src/prompts/CustomerLoyaltyAgentPrompt.txt', 'r') as f:
              print(json.dumps(f.read()))
          ")

          # Build the request body from the template, substituting variables
          jq --arg model "$GPT_DEPLOYMENT" \
             --argjson instructions "$INSTRUCTIONS" \
             '.definition.model = $model | .definition.instructions = $instructions' \
             src/infra/agents/customer-loyalty.json > /tmp/agent-payload.json

          # Get access token for Azure AI Foundry
          TOKEN=$(az account get-access-token --resource "https://ai.azure.com" --query accessToken -o tsv)

          # Create/update the agent version via Foundry REST API
          curl -f -X POST \
            "${FOUNDRY_ENDPOINT}/agents/customer-loyalty/versions?api-version=2025-11-15-preview" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/agent-payload.json

          echo "Customer loyalty agent deployed successfully."
