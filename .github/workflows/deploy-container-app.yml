name: Build and Deploy to Azure Container App

on:
  push:
    branches:
      - main

env:
  AZURE_CONTAINER_REGISTRY: ny35n3dkbvxu4cosureg
  AZURE_CONTAINER_APP: app-ny35n3dkbvxu4
  RESOURCE_GROUP: rg-techworkshop-l300-ai-agents
  IMAGE_NAME: chat-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_FULL_NAME=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          
          docker build -t ${IMAGE_FULL_NAME} ./src
          docker push ${IMAGE_FULL_NAME}
          
          echo "IMAGE_FULL_NAME=${IMAGE_FULL_NAME}" >> $GITHUB_ENV

      - name: Update Container App secrets
        run: |
          az containerapp secret set \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets \
              foundry-endpoint="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt-endpoint="${{ secrets.GPT_ENDPOINT }}" \
              embedding-endpoint="${{ secrets.EMBEDDING_ENDPOINT }}" \
              phi-4-endpoint="${{ secrets.PHI_4_ENDPOINT }}"

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_FULL_NAME }} \
            --set-env-vars \
              FOUNDRY_ENDPOINT=secretref:foundry-endpoint \
              gpt_endpoint=secretref:gpt-endpoint \
              embedding_endpoint=secretref:embedding-endpoint \
              phi_4_endpoint=secretref:phi-4-endpoint

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "Image: ${{ env.IMAGE_FULL_NAME }}"
          echo "Container App: ${{ env.AZURE_CONTAINER_APP }}"
          echo "Resource Group: ${{ env.RESOURCE_GROUP }}"
