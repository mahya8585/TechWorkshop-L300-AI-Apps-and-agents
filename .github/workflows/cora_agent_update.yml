name: Deploy Cora Shopping Assistant Agent

on:
  push:
    paths:
      - 'src/prompts/ShopperAgentPrompt.txt'
      - 'src/infra/agents/cora.json'
      - '.github/workflows/cora_agent_update.yml'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure subscription
        run: |
          SUBSCRIPTION_ID=$(echo '${{ secrets.AZURE_CREDENTIALS }}' | jq -r '.subscriptionId')
          az account set --subscription "$SUBSCRIPTION_ID"
          echo "Active subscription: $(az account show --query name -o tsv)"

      - name: Setup environment variables
        env:
          ENV_CONTENT: ${{ secrets.ENV }}
        run: |
          printf '%s' "$ENV_CONTENT" > /tmp/.env
          cat > /tmp/parse_env.py << 'PYEOF'
          import os
          vals = {}
          for line in open('/tmp/.env').read().splitlines():
              line = line.strip()
              if line.startswith('#') or '=' not in line:
                  continue
              key, _, val = line.partition('=')
              vals[key.strip()] = val.strip().strip('"').strip("'")
          with open(os.environ['GITHUB_ENV'], 'a') as genv:
              genv.write('FOUNDRY_ENDPOINT=' + vals.get('FOUNDRY_ENDPOINT', '') + '\n')
              genv.write('GPT_DEPLOYMENT=' + vals.get('gpt_deployment', '') + '\n')
          print('FOUNDRY_ENDPOINT:', vals.get('FOUNDRY_ENDPOINT', '(empty)'))
          print('GPT_DEPLOYMENT:', vals.get('gpt_deployment', '(empty)'))
          PYEOF
          python3 /tmp/parse_env.py

      - name: Deploy cora agent to Foundry
        run: |
          # Read the prompt file and escape it for JSON
          INSTRUCTIONS=$(python3 -c "
          import json, sys
          with open('src/prompts/ShopperAgentPrompt.txt', 'r') as f:
              print(json.dumps(f.read()))
          ")

          # Build the request body from the template, substituting variables
          jq --arg model "$GPT_DEPLOYMENT" \
             --argjson instructions "$INSTRUCTIONS" \
             '.definition.model = $model | .definition.instructions = $instructions' \
             src/infra/agents/cora.json > /tmp/agent-payload.json

          # Get access token for Azure AI Foundry
          TOKEN=$(az account get-access-token --resource "https://cognitiveservices.azure.com" --query accessToken -o tsv)

          # Create/update the agent version via Foundry REST API
          curl -f -X POST \
            "${FOUNDRY_ENDPOINT}/agents/cora/versions?api-version=2025-11-15-preview" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/agent-payload.json

          echo "Cora shopping assistant agent deployed successfully."
